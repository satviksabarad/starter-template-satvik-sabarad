<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantt Chart Builder v2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f7f8fa;
      --border: #e2e5ea;
      --text: #1a1d2e;
      --text-dim: #6b7280;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent-hover: #4338ca;
      --success: #059669;
      --error: #dc2626;
      --header: #1e1b4b;
      --header-dim: #a5b4fc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: var(--header);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 20;
    }
    .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .logo em { color: #818cf8; font-style: normal; }
    .header-spacer { flex: 1; }
    .hbtn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #e0e7ff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .hbtn:hover { background: rgba(255,255,255,0.18); }

    /* ── Settings ───────────────────────────────────────── */
    .settings {
      background: #2d2a6e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease;
      flex-shrink: 0;
    }
    .settings.open { max-height: 56px; }
    .settings-inner {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-label { font-size: 12px; color: var(--header-dim); white-space: nowrap; }
    .settings-input {
      flex: 1; max-width: 380px;
      padding: 5px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #fff; font-size: 12px;
      font-family: 'SF Mono', Consolas, monospace;
    }
    .settings-input:focus { outline: none; border-color: #818cf8; }
    .settings-input::placeholder { color: rgba(255,255,255,0.3); }
    .sbtn {
      padding: 5px 12px; border: none; border-radius: 5px;
      font-size: 12px; cursor: pointer; font-weight: 500;
    }
    .sbtn.primary { background: #4f46e5; color: #fff; }
    .sbtn.primary:hover { background: #4338ca; }
    .sbtn.ghost {
      background: transparent; color: var(--header-dim);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .sbtn.ghost:hover { border-color: rgba(255,255,255,0.3); }

    /* ── Main ───────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Chat panel ─────────────────────────────────────── */
    .chat-panel {
      width: 360px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 14px;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* Messages */
    .msg { display: flex; gap: 8px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }
    .msg.system { justify-content: center; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #eef2ff; display: flex;
      align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 80%;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.ai .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }
    .msg-system-text {
      font-size: 11px; color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #9ca3af;
      animation: tdot 1.1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:.6} 30%{transform:translateY(-6px);opacity:1} }

    /* Chat input area */
    .chat-input-area {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .upload-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.15s;
    }
    .upload-btn:hover { border-color: var(--accent); }
    .chat-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      max-height: 140px;
      min-height: 34px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--accent); background: #fff; }
    .chat-input::placeholder { color: #b0b8c6; }
    .send-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent); border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #fileInput { display: none; }

    /* ── Chart panel ─────────────────────────────────────── */
    .chart-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chart-toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .project-title {
      flex: 1; min-width: 0;
      border: none; background: transparent;
      font-size: 15px; font-weight: 700; color: var(--text);
      outline: none; padding: 2px 6px;
      border-radius: 5px;
    }
    .project-title:hover { background: var(--bg); }
    .project-title:focus { background: var(--accent-light); }
    .project-title::placeholder { color: #c0c5d0; font-weight: 400; }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .tbtn {
      padding: 4px 10px; border-radius: 5px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text-dim);
      font-size: 12px; cursor: pointer;
      transition: all 0.12s; white-space: nowrap;
    }
    .tbtn:hover { border-color: var(--accent); color: var(--accent); }
    .tbtn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .task-badge {
      font-size: 11px; color: var(--text-dim);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 9px;
    }

    /* Export dropdown */
    .export-wrap { position: relative; }
    .export-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 4px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      z-index: 50; min-width: 100px; overflow: hidden;
    }
    .export-menu.open { display: block; }
    .export-menu button {
      display: block; width: 100%; padding: 8px 14px;
      background: none; border: none; text-align: left;
      font-size: 13px; cursor: pointer; color: var(--text);
    }
    .export-menu button:hover { background: var(--bg); }

    /* Legend */
    .legend {
      display: none; flex-wrap: wrap; gap: 10px;
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      align-items: center; flex-shrink: 0;
    }
    .legend.show { display: flex; }
    .legend-hd { font-size: 11px; color: var(--text-dim); }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* Chart container */
    .chart-container { flex: 1; overflow: auto; position: relative; }
    .chart-inner { padding: 16px; display: inline-block; min-width: 100%; min-height: 100%; }

    /* Empty state */
    .empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-dim);
    }
    .empty-ico { font-size: 54px; opacity: 0.2; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); opacity: 0.35; }
    .empty-sub { font-size: 13px; text-align: center; max-width: 260px; line-height: 1.5; }

    /* Cursor overlay (fixed, above everything) */
    #cursorLine {
      display: none;
      position: fixed;
      width: 1.5px;
      background: linear-gradient(to bottom, transparent 0%, rgba(79,70,229,0.7) 10%, rgba(79,70,229,0.7) 90%, transparent 100%);
      pointer-events: none;
      z-index: 30;
    }
    #cursorTooltip {
      display: none;
      position: fixed;
      background: #1e1b4b;
      color: #e0e7ff;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      pointer-events: none;
      z-index: 31;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── Status bar ─────────────────────────────────────── */
    .statusbar {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 4px 14px; display: flex; align-items: center;
      gap: 7px; flex-shrink: 0;
    }
    .sdot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #d1d5db; flex-shrink: 0;
    }
    .sdot.ok { background: var(--success); }
    .sdot.err { background: var(--error); }
    .sdot.busy { background: var(--accent); animation: spulse 0.9s ease-in-out infinite; }
    @keyframes spulse { 0%,100%{opacity:1} 50%{opacity:.2} }
    .smsg { font-size: 12px; color: var(--text-dim); }
    .smsg.ok { color: var(--success); }
    .smsg.err { color: var(--error); }
    .sspacer { flex: 1; }
    .sdate { font-size: 11px; color: #b0b8c6; }

    /* Spinner */
    .spin {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spinning 0.5s linear infinite; vertical-align: middle;
    }
    @keyframes spinning { to { transform: rotate(360deg); } }

    /* ── Frappe Gantt overrides ─────────────────────────── */
    #ganttSvg { font-family: inherit; display: block; }
    .gantt .grid-background { fill: #fff; }
    .gantt .grid-row { fill: transparent; }
    .gantt .grid-row:nth-child(even) { fill: #fafbfc; }
    .gantt .grid-header { fill: #f7f8fa; stroke: #e2e5ea; }
    .gantt .row-line { stroke: #eaecf0; stroke-width: 0.5; }
    .gantt .tick { stroke: #e2e5ea; }
    .gantt .tick.thick { stroke: #c8cdd5; }
    .gantt .today-highlight { fill: rgba(79,70,229,0.07); }
    .gantt .upper-text { fill: #6b7280; font-size: 11px; font-weight: 600; }
    .gantt .lower-text { fill: #9ca3af; font-size: 11px; }
    .gantt .bar { rx: 4; fill: #4f46e5; }
    .gantt .bar-label { fill: #fff; font-size: 11px; font-weight: 500; }
    .gantt .bar-progress { fill: #818cf8; }
    .gantt .handle { fill: rgba(255,255,255,0.55); cursor: ew-resize; }
    .gantt .arrow { stroke: #9ca3af; fill: none; marker-end: url(#arrow); }
    .gantt .bar-wrapper:hover .bar { filter: brightness(1.08); }
    .gantt-container { background: #fff !important; }

    /* Category colours */
    .bar-cat-0 .bar { fill: #4f46e5; } .bar-cat-0 .bar-progress { fill: #818cf8; }
    .bar-cat-1 .bar { fill: #0891b2; } .bar-cat-1 .bar-progress { fill: #22d3ee; }
    .bar-cat-2 .bar { fill: #059669; } .bar-cat-2 .bar-progress { fill: #34d399; }
    .bar-cat-3 .bar { fill: #d97706; } .bar-cat-3 .bar-progress { fill: #fbbf24; }
    .bar-cat-4 .bar { fill: #dc2626; } .bar-cat-4 .bar-progress { fill: #f87171; }
    .bar-cat-5 .bar { fill: #7c3aed; } .bar-cat-5 .bar-progress { fill: #a78bfa; }
    .bar-cat-6 .bar { fill: #db2777; } .bar-cat-6 .bar-progress { fill: #f472b6; }
    .bar-cat-7 .bar { fill: #0d9488; } .bar-cat-7 .bar-progress { fill: #2dd4bf; }
    .bar-cat-8 .bar { fill: #ea580c; } .bar-cat-8 .bar-progress { fill: #fb923c; }
    .bar-cat-9 .bar { fill: #65a30d; } .bar-cat-9 .bar-progress { fill: #a3e635; }
  </style>
</head>
<body>

<!-- Cursor overlay elements (fixed position, outside scroll) -->
<div id="cursorLine"></div>
<div id="cursorTooltip"></div>

<!-- ── Header ──────────────────────────────────────────── -->
<header class="header">
  <div class="logo">📅 Gantt <em>Builder</em></div>
  <div class="header-spacer"></div>
  <button class="hbtn" id="settingsBtn">⚙ API Key</button>
</header>

<!-- ── Settings ─────────────────────────────────────────── -->
<div class="settings" id="settingsPanel">
  <div class="settings-inner">
    <span class="settings-label">Anthropic API Key:</span>
    <input type="password" class="settings-input" id="apiKeyInput"
           placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="sbtn primary" id="saveKeyBtn">Save</button>
    <button class="sbtn ghost" id="clearKeyBtn">Clear</button>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────── -->
<div class="main">

  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <button class="upload-btn" id="uploadBtn" title="Upload file (TXT, CSV, MD, DOCX)">📎</button>
      <input type="file" id="fileInput" accept=".txt,.csv,.md,.tsv,.docx">
      <textarea class="chat-input" id="chatInput" rows="1"
        placeholder="Describe your timeline… (Enter to send, Shift+Enter for new line)"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">➤</button>
    </div>
  </div>

  <!-- Chart panel -->
  <div class="chart-panel" id="chartPanel">
    <div class="chart-toolbar">
      <input class="project-title" id="projectTitle" placeholder="Untitled Project" maxlength="80">
      <div class="toolbar-divider"></div>
      <span style="font-size:11px;color:var(--text-dim)">Zoom:</span>
      <button class="tbtn" id="zDay"   onclick="setZoom('Day')">Day</button>
      <button class="tbtn active" id="zWeek" onclick="setZoom('Week')">Week</button>
      <button class="tbtn" id="zMonth" onclick="setZoom('Month')">Month</button>
      <div class="toolbar-divider"></div>
      <span class="task-badge" id="taskBadge" style="display:none"></span>
      <div class="export-wrap">
        <button class="tbtn" id="exportBtn" onclick="toggleExport()">↓ Export</button>
        <div class="export-menu" id="exportMenu">
          <button onclick="exportChart('png');toggleExport(false)">PNG image</button>
          <button onclick="exportChart('jpeg');toggleExport(false)">JPEG image</button>
        </div>
      </div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="chart-container" id="chartContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-ico">📊</div>
        <div class="empty-title">No timeline yet</div>
        <div class="empty-sub">Type a description in the chat, or click 📎 to upload a document. Claude will build your Gantt chart.</div>
      </div>
      <div class="chart-inner" id="chartInner" style="display:none"></div>
    </div>
  </div>

</div>

<!-- ── Status bar ────────────────────────────────────────── -->
<div class="statusbar">
  <div class="sdot" id="sdot"></div>
  <span class="smsg" id="smsg">Ready</span>
  <div class="sspacer"></div>
  <span class="sdate" id="sdate"></span>
</div>

<!-- CDN scripts -->
<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const CAT_COLORS = [
  '#4f46e5','#0891b2','#059669','#d97706','#dc2626',
  '#7c3aed','#db2777','#0d9488','#ea580c','#65a30d'
];

// ── State ──────────────────────────────────────────────────────────────────
let currentTasks  = [];
let chatHistory   = []; // [{role, content}] sent to Claude
let ganttInstance = null;
let currentZoom   = 'Week';
let isBusy        = false;

// ── Status bar ─────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  document.getElementById('sdot').className = 'sdot' + (type ? ' ' + type : '');
  const el = document.getElementById('smsg');
  el.textContent = msg;
  el.className = 'smsg' + (type ? ' ' + type : '');
}

document.getElementById('sdate').textContent =
  'Today: ' + new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});

// ── API Key ────────────────────────────────────────────────────────────────
const loadKey = () => localStorage.getItem('anthropic_api_key') || '';

document.getElementById('settingsBtn').addEventListener('click', () => {
  const p = document.getElementById('settingsPanel');
  const opening = !p.classList.contains('open');
  p.classList.toggle('open');
  if (opening) {
    document.getElementById('apiKeyInput').value = loadKey();
    setTimeout(() => document.getElementById('apiKeyInput').focus(), 220);
  }
});
document.getElementById('saveKeyBtn').addEventListener('click', () => {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) return;
  localStorage.setItem('anthropic_api_key', k);
  document.getElementById('settingsPanel').classList.remove('open');
  setStatus('API key saved.', 'ok');
});
document.getElementById('clearKeyBtn').addEventListener('click', () => {
  localStorage.removeItem('anthropic_api_key');
  document.getElementById('apiKeyInput').value = '';
  setStatus('API key cleared.', '');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('settingsPanel').classList.remove('open');
});

// ── Chat helpers ───────────────────────────────────────────────────────────
function mdToHtml(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:#f0f2f5;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\n/g,'<br>');
}

function addMessage(role, content) {
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (role === 'user') {
    div.innerHTML = `<div class="msg-bubble">${mdToHtml(content)}</div>`;
  } else if (role === 'ai') {
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble">${mdToHtml(content)}</div>`;
  } else { // system
    div.innerHTML = `<span class="msg-system-text">${mdToHtml(content)}</span>`;
  }

  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function setInputBusy(busy) {
  isBusy = busy;
  document.getElementById('sendBtn').disabled = busy;
  document.getElementById('chatInput').disabled = busy;
  document.getElementById('uploadBtn').disabled = busy;
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function callClaude(userContent) {
  const apiKey = loadKey();
  if (!apiKey) throw new Error('No API key — click ⚙ API Key in the header.');

  const today = new Date().toISOString().split('T')[0];
  const year  = new Date().getFullYear();

  const system = `You are a helpful project management assistant that builds and edits Gantt charts through conversation.
Today: ${today}. Current year: ${year}.

CURRENT CHART TASKS:
${currentTasks.length > 0 ? JSON.stringify(currentTasks, null, 2) : 'None yet — this is a new project.'}

INSTRUCTIONS:
• When the user describes a timeline, uploads a document, or asks to modify tasks, extract or update all tasks.
• When just answering a question or acknowledging, set "tasks" to null.
• Always return the COMPLETE task list (all tasks, not only changed ones).
• Compute absolute YYYY-MM-DD dates from relative references (e.g. "3 weeks", "after design").
• end date must always be at least 1 day after start.
• Keep your "message" concise (1–3 sentences), friendly, and action-oriented.

REQUIRED RESPONSE FORMAT — respond ONLY with this JSON object, no other text:
{
  "message": "Short friendly response",
  "tasks": [ { "id":"task1","name":"...","start":"YYYY-MM-DD","end":"YYYY-MM-DD","progress":0,"dependencies":"","category":"..." } ] or null
}`;

  const messages = [...chatHistory, { role: 'user', content: userContent }];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 4096,
      system,
      messages
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error('Invalid API key.');
    if (res.status === 429) throw new Error('Rate limited — wait a moment and try again.');
    if (res.status === 400 && err.error?.message?.includes('credit'))
      throw new Error('Insufficient credits. Check your billing at console.anthropic.com.');
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.content[0].text;
}

function parseResponse(raw) {
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) return { message: raw, tasks: null };
  try {
    return JSON.parse(match[0]);
  } catch (_) {
    return { message: raw, tasks: null };
  }
}

// ── Handle send ────────────────────────────────────────────────────────────
async function handleSend(displayText, apiText) {
  const text = apiText || displayText;
  if (!text || !text.trim()) return;
  if (isBusy) return;

  if (displayText) addMessage('user', displayText);
  chatHistory.push({ role: 'user', content: text });

  setInputBusy(true);
  showTyping();
  setStatus('Claude is thinking…', 'busy');

  try {
    const raw = await callClaude(text);
    const parsed = parseResponse(raw);

    chatHistory.push({ role: 'assistant', content: raw });
    hideTyping();
    addMessage('ai', parsed.message || 'Done!');

    if (parsed.tasks && Array.isArray(parsed.tasks) && parsed.tasks.length > 0) {
      renderChart(parsed.tasks);
      setStatus(`Chart updated · ${parsed.tasks.length} task${parsed.tasks.length !== 1 ? 's' : ''}`, 'ok');
    } else {
      setStatus('Ready', '');
    }
  } catch (err) {
    hideTyping();
    addMessage('system', `⚠ ${err.message}`);
    setStatus(err.message, 'err');
  } finally {
    setInputBusy(false);
  }
}

// ── Chat input wiring ──────────────────────────────────────────────────────
const chatInput = document.getElementById('chatInput');

chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = chatInput.value.trim();
    if (!val) return;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    handleSend(val);
  }
});

document.getElementById('sendBtn').addEventListener('click', () => {
  const val = chatInput.value.trim();
  if (!val) return;
  chatInput.value = '';
  chatInput.style.height = 'auto';
  handleSend(val);
});

// ── File upload ────────────────────────────────────────────────────────────
document.getElementById('uploadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  await processFile(file);
});

async function processFile(file) {
  if (isBusy) return;
  const ext = file.name.split('.').pop().toLowerCase();
  let content = '';

  setInputBusy(true);
  showTyping();
  setStatus('Reading file…', 'busy');

  try {
    if (['txt','csv','md','tsv','text'].includes(ext)) {
      content = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = ev => res(ev.target.result);
        r.onerror = rej;
        r.readAsText(file);
      });
    } else if (ext === 'docx') {
      if (typeof mammoth === 'undefined') {
        throw new Error('DOCX support not loaded — check your internet connection.');
      }
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      content = result.value;
    } else {
      hideTyping();
      setInputBusy(false);
      addMessage('system', `Unsupported file type ".${ext}". Supported: TXT, CSV, MD, DOCX.`);
      setStatus('Ready', '');
      return;
    }

    if (!content.trim()) {
      hideTyping();
      setInputBusy(false);
      addMessage('system', 'The file appears to be empty.');
      setStatus('Ready', '');
      return;
    }

    if (content.length > 18000) {
      content = content.slice(0, 18000) + '\n\n[…file truncated for length]';
    }

    const display = `📄 **${file.name}**`;
    const apiText = `I'm uploading a file called "${file.name}". Please read the contents below and extract any project timeline, tasks, or schedule information to build a Gantt chart.\n\nFile contents:\n\n${content}`;

    addMessage('user', display);
    chatHistory.push({ role: 'user', content: apiText });
    setStatus('Claude is reading the document…', 'busy');

    const raw = await callClaude(apiText);
    const parsed = parseResponse(raw);
    chatHistory.push({ role: 'assistant', content: raw });

    hideTyping();
    addMessage('ai', parsed.message || 'Document processed!');

    if (parsed.tasks && parsed.tasks.length > 0) {
      renderChart(parsed.tasks);
      setStatus(`Chart built from file · ${parsed.tasks.length} tasks`, 'ok');
    } else {
      setStatus('Ready', '');
    }
  } catch (err) {
    hideTyping();
    addMessage('system', `⚠ ${err.message}`);
    setStatus(err.message, 'err');
  } finally {
    setInputBusy(false);
  }
}

// ── Render chart ───────────────────────────────────────────────────────────
function renderChart(tasks) {
  currentTasks = tasks.map((t, i) => ({
    id:           t.id || `task${i + 1}`,
    name:         t.name || `Task ${i + 1}`,
    start:        t.start,
    end:          t.end,
    progress:     Number(t.progress) || 0,
    dependencies: t.dependencies || '',
    category:     t.category || 'General'
  }));

  // Assign category colours
  const catMap = {};
  let cIdx = 0;
  currentTasks.forEach(t => {
    if (!(t.category in catMap)) {
      catMap[t.category] = { i: cIdx, color: CAT_COLORS[cIdx % CAT_COLORS.length] };
      cIdx++;
    }
    t.custom_class = `bar-cat-${catMap[t.category].i % 10}`;
  });

  // Show chart
  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('chartInner').style.display  = 'block';
  document.getElementById('chartInner').innerHTML      = '<svg id="ganttSvg"></svg>';

  ganttInstance = new Gantt('#ganttSvg', currentTasks, {
    view_mode:   currentZoom,
    date_format: 'YYYY-MM-DD',
    popup_trigger: 'hover',
    language:    'en',
    custom_popup_html: task => `
      <div style="background:#fff;border:1px solid #e2e5ea;border-radius:8px;
           padding:10px 14px;font-size:12px;line-height:1.6;color:#1a1d2e;
           min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,0.1);
           font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <strong style="font-size:13px">${task.name}</strong>
        <div style="color:#6b7280;margin-top:2px">${task.start} → ${task.end}</div>
        ${task.category ? `<div style="color:#9ca3af;font-size:11px">${task.category}</div>` : ''}
        ${task.progress > 0 ? `<div style="color:#059669;font-weight:600;margin-top:4px">${task.progress}% complete</div>` : ''}
      </div>`,
    on_date_change(task, start, end) {
      // Persist dragged dates into currentTasks so they survive re-renders
      const t = currentTasks.find(x => x.id === task.id);
      if (t) {
        t.start = fmtDate(start);
        t.end   = fmtDate(end);
      }
    },
    on_progress_change(task, progress) {
      const t = currentTasks.find(x => x.id === task.id);
      if (t) t.progress = progress;
    }
  });

  // Task badge
  const badge = document.getElementById('taskBadge');
  badge.textContent = `${currentTasks.length} task${currentTasks.length !== 1 ? 's' : ''}`;
  badge.style.display = 'inline';

  // Legend
  renderLegend(catMap);
}

function renderLegend(catMap) {
  const el = document.getElementById('legend');
  const cats = Object.entries(catMap);
  if (cats.length <= 1) { el.classList.remove('show'); return; }
  el.innerHTML = '<span class="legend-hd">Categories:</span>' +
    cats.map(([name, info]) =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${info.color}"></div>
        <span>${name}</span>
      </div>`
    ).join('');
  el.classList.add('show');
}

function fmtDate(d) {
  return d instanceof Date
    ? d.toISOString().split('T')[0]
    : String(d).split('T')[0];
}

// ── Zoom ───────────────────────────────────────────────────────────────────
function setZoom(mode) {
  currentZoom = mode;
  ['Day','Week','Month'].forEach(m =>
    document.getElementById('z' + m).classList.toggle('active', m === mode)
  );
  if (ganttInstance) ganttInstance.change_view_mode(mode);
}

// ── Cursor line & date tooltip ─────────────────────────────────────────────
const cursorLine    = document.getElementById('cursorLine');
const cursorTooltip = document.getElementById('cursorTooltip');
const chartContainer = document.getElementById('chartContainer');

function xToDate(xInContainer) {
  if (!ganttInstance) return null;
  try {
    const gs = ganttInstance.gantt_start;
    if (!gs) return null;
    const colW = ganttInstance.options.column_width || 30;
    const step = ganttInstance.options.step || 24; // hours per column
    const pxPerHour = colW / step;
    const ms = (xInContainer / pxPerHour) * 3600 * 1000;
    return new Date(new Date(gs).getTime() + ms);
  } catch (_) { return null; }
}

function fmtCursorDate(d) {
  if (!d || isNaN(d)) return '';
  switch (currentZoom) {
    case 'Day':   return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    case 'Month': return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    default:      return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
}

chartContainer.addEventListener('mousemove', e => {
  if (!ganttInstance) return;

  const rect = chartContainer.getBoundingClientRect();
  const scrollX = xInChart(e.clientX, rect);
  const date = xToDate(scrollX);

  // Cursor line — fixed position, spans the chart container height only
  cursorLine.style.left   = e.clientX + 'px';
  cursorLine.style.top    = rect.top + 'px';
  cursorLine.style.height = rect.height + 'px';
  cursorLine.style.display = 'block';

  if (date) {
    const label = fmtCursorDate(date);
    cursorTooltip.textContent = label;
    // Keep tooltip inside viewport horizontally
    const tipW = cursorTooltip.offsetWidth || 110;
    const left = (e.clientX + 12 + tipW > window.innerWidth)
      ? e.clientX - tipW - 10
      : e.clientX + 12;
    cursorTooltip.style.left    = left + 'px';
    cursorTooltip.style.top     = (rect.top + 8) + 'px';
    cursorTooltip.style.display = 'block';
  }
});

chartContainer.addEventListener('mouseleave', () => {
  cursorLine.style.display    = 'none';
  cursorTooltip.style.display = 'none';
});

function xInChart(clientX, containerRect) {
  // Position in the scrollable content, not just visible area
  return (clientX - containerRect.left) + chartContainer.scrollLeft;
}

// ── Export ─────────────────────────────────────────────────────────────────
function toggleExport(force) {
  const m = document.getElementById('exportMenu');
  if (force === false) { m.classList.remove('open'); return; }
  m.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.export-wrap')) toggleExport(false);
});

async function exportChart(format) {
  const svgEl = document.querySelector('#chartInner svg');
  if (!svgEl) { setStatus('Nothing to export yet.', 'err'); return; }

  const title = document.getElementById('projectTitle').value.trim() || 'Project Timeline';
  setStatus('Exporting…', 'busy');

  try {
    const rect = svgEl.getBoundingClientRect();
    const W = Math.round(rect.width)  || 900;
    const H = Math.round(rect.height) || 400;
    const TITLE_H = 56;

    // Clone SVG and inject inline styles
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('width',  W);
    clone.setAttribute('height', H);

    // Grab styles from inline <style> blocks only
    let css = '';
    for (const sheet of document.styleSheets) {
      if (sheet.href) continue; // skip CDN stylesheets (CORS)
      try {
        for (const rule of sheet.cssRules) css += rule.cssText + '\n';
      } catch (_) {}
    }
    const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    styleEl.textContent = css;
    clone.insertBefore(styleEl, clone.firstChild);

    const ganttSvgStr = new XMLSerializer().serializeToString(clone);

    // Build wrapper SVG with title + gantt
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const fullSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H + TITLE_H}">
      <rect width="100%" height="100%" fill="#ffffff"/>
      <text x="16" y="30"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
        font-size="20" font-weight="700" fill="#1a1d2e">${esc(title)}</text>
      <text x="16" y="48"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
        font-size="11" fill="#9ca3af">Exported ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</text>
      <g transform="translate(0,${TITLE_H})">${ganttSvgStr}</g>
    </svg>`;

    const blob = new Blob([fullSvg], { type: 'image/svg+xml;charset=utf-8' });
    const url  = URL.createObjectURL(blob);

    const img = new Image();
    img.onload = () => {
      const scale  = 2;
      const canvas = document.createElement('canvas');
      canvas.width  = W * scale;
      canvas.height = (H + TITLE_H) * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H + TITLE_H);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);

      const mime = format === 'jpeg' ? 'image/jpeg' : 'image/png';
      const ext  = format === 'jpeg' ? 'jpg' : 'png';
      const safe = title.replace(/[^a-z0-9\-_ ]/gi, '_').trim() || 'gantt';

      const link = document.createElement('a');
      link.download = `${safe}.${ext}`;
      link.href = canvas.toDataURL(mime, format === 'jpeg' ? 0.92 : 1.0);
      link.click();
      setStatus(`Exported as ${format.toUpperCase()}`, 'ok');
    };
    img.onerror = () => { URL.revokeObjectURL(url); setStatus('Export failed.', 'err'); };
    img.src = url;

  } catch (err) {
    setStatus('Export error: ' + err.message, 'err');
    console.error(err);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
(function init() {
  const hasKey = !!loadKey();

  // Welcome message
  addMessage('ai',
    hasKey
      ? 'Hi! I\'m your Gantt chart assistant. Describe your project timeline, or click 📎 to upload a document (TXT, CSV, MD, DOCX). You can also ask me to modify tasks later.'
      : 'Hi! To get started, click **⚙ API Key** in the header and enter your Anthropic API key. Then describe your project timeline here or upload a document.'
  );

  setStatus(hasKey ? 'Ready — describe your timeline.' : 'Add your API key to begin.', hasKey ? 'ok' : '');

  if (!hasKey) document.getElementById('settingsPanel').classList.add('open');
})();
</script>
